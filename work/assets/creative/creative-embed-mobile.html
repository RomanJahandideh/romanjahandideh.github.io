<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Project</title>
  <link rel="stylesheet" href="./mobile-embed.css" />
</head>
<body>
  <div class="mobile-shell">
    <header class="topbar">
      <div class="brand">Project</div>
      <div class="topbar-chip">Mobile View</div>
    </header>

    <main class="mobile-stage" id="mobileStage">
      <section class="hero-card surface">
        <div class="eyebrow">Selected Work</div>
        <h1 class="project-title" id="projectTitle">Project</h1>
        <p class="project-intro" id="projectIntro">
          Loading project details.
        </p>

        <div class="hero-media" id="heroMedia" aria-hidden="true">
          <img id="heroImage" alt="" />
          <div class="hero-glow"></div>
        </div>

        <div class="project-actions">
          <button id="projectLinkBtn" class="link-pill" type="button">LINK</button>
        </div>
      </section>

      <section class="gallery-grid" id="galleryGrid" aria-label="Project images">
        <article class="gallery-card surface is-hidden" id="galleryCardA">
          <img id="galleryImageA" alt="" />
        </article>
        <article class="gallery-card surface is-hidden" id="galleryCardB">
          <img id="galleryImageB" alt="" />
        </article>
      </section>

      <section class="content-stack" id="contentStack" aria-label="Project description"></section>
    </main>
  </div>

  <script src="./mobile-embed.js?v=20260317-1"></script>
</body>
</html>

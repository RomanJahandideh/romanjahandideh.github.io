<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Roman Jahandideh | Work</title>

  <!-- Main site styles (nav + base) -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css" />

  <!-- Work-page layout + handlers -->
  <link rel="stylesheet" href="assets/css/main.css" />

  <!-- Bubble visuals (same file name; replace its CONTENT with the bubble CSS I gave you) -->
  <link rel="stylesheet" href="assets/css/work-card.css" />

  <!-- Graph + interaction layout -->
  <link rel="stylesheet" href="assets/css/work-cards-d3.css" />
  <link rel="stylesheet" href="assets/css/stage3-modal.css" />
</head>

<body class="page-work-only work-page">
  <!-- Shared navigation placeholder -->
  <div id="site-nav"></div>

  <!-- Background (shared image layer) -->
  <div id="bg" aria-hidden="true"></div>

  <!-- Spider Web Canvas (background layer) -->
  <canvas id="spiderweb-canvas" aria-hidden="true"></canvas>

  <main id="main">
    <section id="work" class="work" tabindex="-1" aria-label="Work">
      <div class="work-wrap">

        <!-- Main “stack” container (we keep the same IDs/classes so your old JS keeps working) -->
        <div id="card-stack" class="work-scale-wrap stack-default">
          <div class="one-div" id="main-stack" aria-label="Work categories">

            <a class="layer layer1" data-category="Animations">
              <div class="label">Animations</div>
            </a>

            <a class="layer layer2" data-category="CG Art">
              <div class="label">CG Art</div>
            </a>

            <a class="layer layer3" data-category="Narrative">
              <div class="label">Narrative</div>
            </a>

            <a class="layer layer4" data-category="Game Design">
              <div class="label">Game Design</div>
            </a>

            <a class="layer layer5" data-category="Projects">
              <div class="label">Projects</div>
            </a>

            <a class="layer layer6" data-category="Articles">
              <div class="label">Articles</div>
            </a>

          </div>
        </div>

        <!-- Graph spawns here AFTER clicking -->
        <div id="graph-container"></div>

        <p class="work-hint">
          Hover a layer to reveal its label. Click to explore.
        </p>
      </div>
    </section>
  </main>

  <!-- Shared main behavior (wheel navigation + HOME eye system) -->
  <script src="../assets/js/main.js"></script>

  <!-- Keep your original nav loader -->
  <script src="../assets/js/nav.js"></script>

  <!-- D3 Library -->
  <script src="https://d3js.org/d3.v3.min.js"></script>

  <!-- Spider Web system (Canvas) -->
  <script src="assets/js/spiderweb.js"></script>

  <!-- NEW: bubble motion inside the center cage -->
  
  <!-- Project data -->
  <script src="assets/js/projects-data.js?v=20260306-2"></script>

  <!-- Interaction logic (click → stack-active + graph spawn) -->
  <script src="assets/js/stage3-modal.js?v=20260306-2"></script>

  <!-- Interaction logic (click → stack-active + graph spawn) -->
  <script src="assets/js/work-d3-interaction.js?v=20260306-2"></script>
</body>
</html>

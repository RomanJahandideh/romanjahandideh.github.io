<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Preview</title>
  <link rel="stylesheet" href="./embed-overrides.css?v=20260321-stage3-datafix" />
</head>
<body>
  <main class="s3-page" aria-label="Project preview">
    <section class="s3-card s3-story" aria-live="polite">
      <header class="s3-header">
        <p id="s3Category" class="s3-category"></p>
        <h1 id="s3Title" class="s3-title">Project</h1>
      </header>

      <article class="s3-storyFlow" aria-label="Project story">
        <section class="s3-storySection" aria-label="Story section 1">
          <figure class="s3-mediaWrap">
            <img id="s3Image1" class="s3-storyImage" alt="" />
            <div id="s3ImageFallback1" class="s3-imageFallback" aria-hidden="true">Image</div>
          </figure>
          <div class="s3-textPanel">
            <p id="s3Text1" class="s3-textBlock"></p>
          </div>
        </section>

        <section class="s3-storySection" aria-label="Story section 2">
          <figure class="s3-mediaWrap">
            <img id="s3Image2" class="s3-storyImage" alt="" />
            <div id="s3ImageFallback2" class="s3-imageFallback" aria-hidden="true">Image</div>
          </figure>
          <div class="s3-textPanel">
            <p id="s3Text2" class="s3-textBlock"></p>
          </div>
        </section>

        <section class="s3-storySection" aria-label="Story section 3">
          <figure class="s3-mediaWrap">
            <img id="s3Image3" class="s3-storyImage" alt="" />
            <div id="s3ImageFallback3" class="s3-imageFallback" aria-hidden="true">Image</div>
          </figure>
          <div class="s3-textPanel">
            <p id="s3Text3" class="s3-textBlock"></p>
          </div>
        </section>
      </article>

      <div class="s3-actions">
        <a id="s3LinkButton" class="s3-linkButton" href="#" target="_blank" rel="noopener noreferrer">Open Project</a>
      </div>

      <!-- Legacy nodes preserved so the existing system architecture does not get annoyed and revolt -->
      <div class="s3-legacy" aria-hidden="true">
        <figure class="s3-heroWrap">
          <img id="s3HeroImage" class="s3-heroImage" alt="" />
          <div id="s3HeroFallback" class="s3-imageFallback">Image</div>
        </figure>

        <div class="s3-thumbGrid">
          <button class="s3-thumb is-active" type="button" data-index="1">
            <img id="s3ThumbImage1" alt="" />
            <span class="s3-thumbFallback">Image</span>
          </button>
          <button class="s3-thumb" type="button" data-index="2">
            <img id="s3ThumbImage2" alt="" />
            <span class="s3-thumbFallback">Image</span>
          </button>
        </div>

        <div id="s3Description" class="s3-description"></div>
        <div id="s3Metadata" class="s3-metadata"></div>
      </div>
    </section>
  </main>

  <script src="./app-embed.js?v=20260321-stage3-datafix"></script>
</body>
</html>
